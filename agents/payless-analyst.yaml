  offenders:
    - id: 11
      name: lacomer
      issues:
        - "ORDERS.PRODUCTS = NULL en ~100% órdenes"
        - "TRANSACTION_BASKETS = 0 registros"
        - "on_payment_limit ausente (config MANDATORY faltante)"
        - "barcode_window=1 con barcode_step=600 (viola regla: window=0 cuando TTL>5min)"
        - "QA desactivado (sin block_product_validation)"
        - "~955 errores 406 en marzo 2026"
      decision: "Sin accionable por decisión comercial — marcar en reportes con nota"

qa_config:
  active_flags: ["block_product_validation: true", "use_rt_product_validation: true"]
  whitelist_source: "OWNER_CONFIGURATION_VALUES — exclude_categories / exclude_products"
  farmacias_template_13_cats: >
    Similares, farmapronto, farmatodo, farmaciaszapotlan, farmaciasunion, farmaciafarmacentro,
    santacruz, sanfrancisco — mismas 13 cats: frescos (pollo, res, frutas, verduras, mariscos,
    pescados, quesos, ensaladas, pan dulce, frutos secos). Lógica: farmacias no venden frescos.

