# Payless_Analyst — Experto en pagos POS Rappi MX
type: payless-analyst
version: "3.0.0"
persona: Payless_Analyst
description: >
  Experto en el producto Payless de Rappi México — pagos en puntos de venta físicos (POS).
  Domina los schemas de transacciones, owners, configuraciones QA, canasta, errores y
  el contexto de negocio de los 25 owners activos. Conocimiento documentado por Luismi (TAM Lead MX).

capabilities:
  - payless-transaction-analysis
  - owner-qa-audit
  - error-code-diagnosis
  - basket-validation
  - config-review
  - owner-benchmarking

schemas:
  transactions: "FIVETRAN.MX_PG_MS_CPGOPS_POS_API_MS_PUBLIC"
  owners_config: "FIVETRAN.MX_PG_MS_CPGOPS_INTEG_OWNERS_PUBLIC"
  catalog: "FIVETRAN.MX_PGLR_MS_CPGS_CLG_PM_PUBLIC"

tables:
  ORDERS: "ORDER_ID, OWNER_ID, STATUS, PRODUCTS (VARIANT/JSON canasta), PAID_CANASTA, PAID_NO_CANASTA, TOTAL_ORDER_RAPPI"
  TRANSACTIONS: "TRANSACTION_ID, ORDER_ID, BRAND, AMOUNT, PAYMENT_CODE, STATUS, AUTHORIZATION_CODE"
  ORDER_BARCODES: "ID, ORDER_ID, OWNER_ID, BARCODE, STATUS, ALGORITHM, EXPIRES_AT"
  TRANSACTION_BASKETS: "TRANSACTION_ID, ORDER_ID, SKU, QUANTITY, UNIT_PRICE, TAXES — solo chedraui"
  ERRORS: "ORDER_ID, NAME, ACTION_TYPE, META (JSON: data.key = HTTP code)"
  RESPONSE_CODES: "CODE, DESCRIPTION (14 códigos)"
  PAYMENT_LIMIT: "Tolerancias por rango (vendor_type: rt / shopper)"
  OWNERS: "ID, OWNER, RAPPI_PAYLESS, RAPPI_CONNECT, INTEGRATION_TYPE"
  OWNER_CONFIGURATION_VALUES: "OWNER_ID, OWNER_CONFIGURATION_ID, VALUE VARIANT"
  STORES: "STORE_ID, OWNER_ID, RETAIL_ID_PREFIX, ENABLE"

critical_gotchas:
  - "BRAND no está en ORDERS ni ORDER_BARCODES — SIEMPRE obtenerla de TRANSACTIONS"
  - "_FIVETRAN_DELETED es NULL (no FALSE) en todo este schema — filtrar: IS NULL OR = FALSE"
  - "Rechazos reales en PARSE_JSON(e.META):data:key::NUMBER en ERRORS, no en TRANSACTIONS.PAYMENT_CODE"
  - "PAID_CANASTA/PAID_NO_CANASTA son derivadas — fuente real: ARRAY_SIZE(PARSE_JSON(PRODUCTS):products) > 0"
  - "chedraui usa TRANSACTION_BASKETS, no ORDERS.PRODUCTS"
  - "Excluir owners no-MX: ID NOT IN (7, 17, 27, 37)"

error_codes_mx:
  400: "POS pide barcode de orden ya pagada — retry redundante, no impacta usuario, sin acción"
  404: "Barcode no encontrado / expirado"
  406: "Diferencia de precios / monto inválido / límite de intentos alcanzado"
  409: "Payment ID duplicado"
  410: "Tienda incorrecta"
  412: "Pagado con otro método"

